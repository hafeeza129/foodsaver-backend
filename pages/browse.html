<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodSaver — Browse Food</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<nav class="nav">
  <a href="../index.html" class="nav-logo">
    <div class="nav-logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2C8 2 4 6 4 10c0 6 8 12 8 12s8-6 8-12c0-4-4-8-8-8z"/><circle cx="12" cy="10" r="2.5"/></svg>
    </div>
    <span class="nav-logo-text">FoodSaver</span>
  </a>
  <div class="nav-links">
    <a href="browse.html" class="active">Browse food</a>
    <a href="upload.html">List food</a>
    <a href="profile.html">Profile</a>
  </div>
  <div class="nav-right">
    <a href="upload.html" class="btn btn-green btn-sm">+ List food</a>
    <a href="profile.html" class="nav-avatar" id="nav-avatar" title="Profile">?</a>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px">
    <div>
      <h1 class="page-title">Available food</h1>
      <p class="page-sub" id="result-count">Loading listings…</p>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <select class="form-select" id="sort-select" style="width:auto;font-size:13px" onchange="renderListings()">
        <option value="expiry">Sort: Expiring soonest</option>
        <option value="dist">Sort: Nearest first</option>
        <option value="qty">Sort: Most food</option>
      </select>
    </div>
  </div>

  <!-- Map strip -->
  <div class="map-strip" id="map-strip">
    <div class="map-dots" id="map-dots"></div>
    <span class="map-label-text" id="map-label">6 listings near Vijayawada</span>
  </div>

  <!-- Filters -->
  <div class="filter-row">
    <input class="search-input" type="text" id="search" placeholder="Search restaurant or food…" oninput="renderListings()">
    <button class="filter-pill" id="fp-veg" onclick="toggleFilter('veg')">🌿 Vegetarian</button>
    <button class="filter-pill" id="fp-urgent" onclick="toggleFilter('urgent')">⏱ Expiring soon</button>
    <button class="filter-pill" id="fp-avail" onclick="toggleFilter('avail')">✓ Available only</button>
  </div>

  <!-- Listings -->
  <div class="listings-grid" id="listing-grid"></div>
</div>

<!-- Contact Modal -->
<div class="modal-overlay" id="contact-modal" onclick="if(event.target===this)closeContact()">
  <div class="modal">
    <button class="modal-close" onclick="closeContact()">✕</button>
    <div class="modal-title" id="modal-rest-name">Restaurant</div>
    <p class="modal-sub" id="modal-rest-food" style="margin-bottom:.75rem"></p>
    <div class="badge badge-gray" id="modal-rest-address" style="font-size:12px;margin-bottom:1.5rem;max-width:100%"></div>
    <div class="contact-row">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.63 19.79 19.79 0 012 1.18 2 2 0 013.18 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L7.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      </div>
      <div>
        <div class="contact-label">Phone</div>
        <div class="contact-val" id="modal-rest-phone">—</div>
      </div>
    </div>
    <div class="contact-row">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <div>
        <div class="contact-label">Email</div>
        <div class="contact-val" id="modal-rest-email">—</div>
      </div>
    </div>
    <div class="contact-row">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <div>
        <div class="contact-label">Pickup window</div>
        <div class="contact-val" id="modal-rest-pickup">—</div>
      </div>
    </div>
    <div style="margin-top:1.5rem;display:flex;gap:10px">
      <a id="modal-phone-link" href="tel:" class="btn btn-green" style="flex:1;justify-content:center">Call restaurant</a>
      <button class="btn btn-outline" onclick="closeContact()" style="flex:1;justify-content:center">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../assets/app.js"></script>
<script>
const filters = { veg: false, urgent: false, avail: false };

function toggleFilter(f) {
  filters[f] = !filters[f];
  document.getElementById('fp-' + f).classList.toggle('active', filters[f]);
  renderListings();
}

function renderListings() {
  const search = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort-select').value;
  const claimed = DB.get('claimed') || [];

  let list = getListings().map(l => ({ ...l, claimedNow: l.claimed || claimed.includes(l.id) }));

  if (filters.veg) list = list.filter(l => l.veg);
  if (filters.urgent) list = list.filter(l => l.expiry < 90 && !l.claimedNow);
  if (filters.avail) list = list.filter(l => !l.claimedNow);
  if (search) list = list.filter(l => l.restaurant.toLowerCase().includes(search) || l.food.toLowerCase().includes(search) || l.category.toLowerCase().includes(search));

  if (sort === 'expiry') list.sort((a, b) => a.expiry - b.expiry);
  else if (sort === 'qty') list.sort((a, b) => b.qty - a.qty);

  const avail = list.filter(l => !l.claimedNow).length;
  document.getElementById('result-count').textContent = avail + ' available · ' + list.length + ' total listings near you';

  const grid = document.getElementById('listing-grid');
  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🍽</div><div class="empty-state-title">No listings match</div><div class="empty-state-sub">Try adjusting your filters or check back later.</div></div>`;
    return;
  }

  grid.innerHTML = list.map(l => `
    <div class="card listing-card ${l.claimedNow ? 'claimed' : ''}" id="lc-${l.id}">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <span class="lc-title">${l.restaurant}</span>
          <span class="badge ${badgeCls(l)}" style="font-size:11px">${badgeTxt(l)}</span>
          ${l.veg ? '<span class="badge badge-green" style="font-size:11px">Veg</span>' : '<span class="badge badge-gray" style="font-size:11px">Non-veg</span>'}
        </div>
        <div class="lc-food">${l.food} · <strong>${l.qty} ${l.unit}</strong></div>
        <div class="lc-meta">
          <span class="lc-meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="10" r="3"/><path d="M12 2C8 2 4 6 4 10c0 6 8 12 8 12s8-6 8-12c0-4-4-8-8-8z"/></svg>
            ${l.address}
          </span>
          <span class="lc-meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Pickup: ${l.pickup}
          </span>
          <span class="lc-meta-item">${l.category}</span>
        </div>
      </div>
      <div class="lc-right">
        <span class="timer-chip ${timeCls(l.expiry)}">${timeFmt(l.expiry)}</span>
        ${l.claimedNow
          ? '<span class="btn btn-sm" style="background:var(--surface-2);color:var(--text-3);cursor:default">Claimed</span>'
          : `<button class="btn btn-green btn-sm" onclick="handleClaim(${l.id})">Claim</button>`}
        <button class="btn btn-outline btn-sm" onclick="openContact(${JSON.stringify(l).replace(/"/g, '&quot;')})">Contact</button>
      </div>
    </div>`).join('');

  // Map dots
  const dots = document.getElementById('map-dots');
  dots.innerHTML = list.slice(0, 8).map((l, i) => {
    const x = 8 + (i * 12) + '%', y = 20 + Math.sin(i * 1.3) * 30 + '%';
    const col = l.claimedNow ? '#C8C5BC' : l.expiry < 30 ? '#C9502A' : '#3E7A28';
    return `<div class="map-dot" style="left:${x};top:${y};background:${col}"></div>`;
  }).join('');
  document.getElementById('map-label').textContent = avail + ' listing' + (avail !== 1 ? 's' : '') + ' near Vijayawada';
}

function handleClaim(id) {
  const session = getSession();
  if (!session) { if (confirm('Please sign in to claim food. Go to login?')) window.location.href = '../login.html'; return; }
  const l = claimListing(id);
  if (l) {
    showToast('✓ Claimed! Contact ' + l.restaurant + ' at ' + l.contact + ' for pickup.');
    renderListings();
  }
}

function openContact(l) {
  document.getElementById('modal-rest-name').textContent = l.restaurant;
  document.getElementById('modal-rest-food').textContent = l.food + ' · ' + l.qty + ' ' + l.unit;
  document.getElementById('modal-rest-address').textContent = l.address;
  document.getElementById('modal-rest-phone').textContent = l.contact;
  document.getElementById('modal-rest-email').textContent = l.email;
  document.getElementById('modal-rest-pickup').textContent = l.pickup;
  document.getElementById('modal-phone-link').href = 'tel:' + l.contact;
  document.getElementById('contact-modal').classList.add('open');
}
function closeContact() { document.getElementById('contact-modal').classList.remove('open'); }

// Countdown tick
setInterval(() => {
  DEMO_LISTINGS.forEach(l => { if (!l.claimed && l.expiry > 0) l.expiry = Math.max(0, l.expiry - 1); });
  renderListings();
}, 60000);

renderListings();
</script>
  <div style="text-align:center;font-size:12px;color:var(--text-3);padding:1.5rem 1rem;">
    </body>copy; 2026 FoodSaver. All rights reserved. Developed by <strong>Hafeeza Shaik</strong>.
  </div>
</body>
</html>
